<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Create Show - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Add Show</h1>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
  <p class="mb-2"><a th:href="@{/admin/shows}" class="btn btn-outline">View all Shows</a></p>
  <div class="card" style="max-width: 500px;">
    <form th:action="@{/admin/shows/create}" method="post">
      <div class="form-group">
        <label for="eventId">Event</label>
        <select id="eventId" name="eventId" class="form-control" required>
          <option value="">-- Select Event --</option>
          <option th:each="e : ${events}" th:value="${e.id}" th:text="${e.name + ' (ID: ' + e.id + ')'}" th:selected="${eventId != null && eventId == e.id}"></option>
        </select>
      </div>
      <div class="form-group">
        <label for="theaterId">Theater</label>
        <select id="theaterId" name="theaterId" class="form-control" required>
          <option value="">-- Select Theater --</option>
          <option th:each="t : ${theaters}" th:value="${t.id}" th:text="${t.name + ' (ID: ' + t.id + ')'}" th:selected="${theaterId != null && theaterId == t.id}"></option>
        </select>
      </div>
      <div class="form-group">
        <label for="startTime">Start Time (yyyy-MM-ddTHH:mm)</label>
        <input type="datetime-local" id="startTime" name="startTime" class="form-control" th:value="${startTime}" required/>
      </div>
      <div class="form-group">
        <label for="endTime">End Time (yyyy-MM-ddTHH:mm)</label>
        <input type="datetime-local" id="endTime" name="endTime" class="form-control" th:value="${endTime}" required/>
      </div>
      <div class="form-group">
        <label for="totalSeats">Total Seats</label>
        <input type="number" id="totalSeats" name="totalSeats" min="1" class="form-control" th:value="${totalSeats}" required/>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
      <a th:href="@{/admin/shows}" class="btn btn-outline">Back to Shows</a>
    </form>
  </div>
</div>
</body>
</html>
