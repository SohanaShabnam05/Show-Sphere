<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Browse Events - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Browse Events</h1>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <form th:action="@{/browse}" method="get" class="row g-2 align-items-end mb-3">
    <div class="col-auto">
      <label for="category" class="form-label mb-0">Category</label>
      <select id="category" name="category" class="form-select form-select-sm">
        <option value="">All</option>
        <option value="MOVIE">MOVIE</option>
        <option value="CONCERT">CONCERT</option>
        <option value="LIVE_SHOW">LIVE_SHOW</option>
      </select>
    </div>
    <div class="col-auto">
      <label for="eventName" class="form-label mb-0">Event name</label>
      <input type="text" id="eventName" name="eventName" class="form-control form-control-sm" placeholder="Event name"/>
    </div>
    <div class="col-auto">
      <label for="showDate" class="form-label mb-0">Show date</label>
      <input type="date" id="showDate" name="showDate" class="form-control form-control-sm"/>
    </div>
    <div class="col-auto">
      <button type="submit" class="btn btn-primary btn-sm">Search</button>
      <a th:href="@{/browse}" class="btn btn-outline-secondary btn-sm">Clear</a>
    </div>
  </form>
  <div class="row">
    <th:block th:each="show : ${shows}">
      <div class="col-md-6 col-lg-4 mb-3">
        <div class="card">
          <h3 class="card-title" th:text="${show.eventName}">Event</h3>
          <p class="mb-1"><strong>Category:</strong> <span th:text="${show.eventCategory}"></span></p>
          <p class="mb-1"><strong>Theater:</strong> <span th:text="${show.theaterName}"></span></p>
          <p class="mb-1"><strong>Date &amp; Time:</strong> <span th:text="${show.startTime}"></span></p>
          <p class="mb-1"><strong>Price:</strong> ₹<span th:text="${show.basePrice}"></span></p>
          <p class="mb-2"><strong>Available seats:</strong> <span th:text="${show.availableSeats}"></span></p>
          <a th:href="@{/events/{showId}/details(showId=${show.id})}" class="btn btn-primary">View Details</a>
        </div>
      </div>
    </th:block>
  </div>
  <div th:if="${#lists.isEmpty(shows)}" class="card">
    <p>No shows found. Try adjusting filters or check back later.</p>
  </div>
</div>
</body>
</html>
