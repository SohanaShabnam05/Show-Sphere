<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Create Event - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Add Event</h1>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
  <p class="mb-2"><a th:href="@{/admin/events}" class="btn btn-outline">View all Events</a></p>
  <div class="card" style="max-width: 500px;">
    <form th:action="@{/admin/events/create}" method="post">
      <div class="form-group">
        <label for="name">Event Name</label>
        <input type="text" id="name" name="name" class="form-control" th:value="${name}" required/>
      </div>
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category" class="form-control" required>
          <option value="MOVIE" th:selected="${category == 'MOVIE'}">MOVIE</option>
          <option value="CONCERT" th:selected="${category == 'CONCERT'}">CONCERT</option>
          <option value="LIVE_SHOW" th:selected="${category == 'LIVE_SHOW'}">LIVE_SHOW</option>
        </select>
      </div>
      <div class="form-group">
        <label for="basePrice">Base Price (₹)</label>
        <input type="number" id="basePrice" name="basePrice" step="0.01" min="0" class="form-control" th:value="${basePrice}" required/>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
      <a th:href="@{/admin/events}" class="btn btn-outline">Back to Events</a>
    </form>
  </div>
</div>
</body>
</html>
