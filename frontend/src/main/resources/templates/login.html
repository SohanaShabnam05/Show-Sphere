<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Login</h1>
  <p class="text-muted small">Open <strong>http://localhost:9090</strong> (frontend). Do not use 8888 or 8080 (gateway).</p>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
  <div class="card" style="max-width: 400px;">
    <form th:action="@{/login}" th:object="${loginRequest}" method="post">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" th:field="*{email}" class="form-control" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" th:field="*{password}" class="form-control" required/>
      </div>
      <button type="submit" class="btn btn-primary">Login</button>
      <a th:href="@{/register}" class="btn btn-outline">Register</a>
    </form>
  </div>
</div>
</body>
</html>
