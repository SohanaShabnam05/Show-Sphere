<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Event Details - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Event Details</h1>
  <div th:if="${event}" class="card">
    <p><strong>ID:</strong> <span th:text="${event.id}"></span></p>
    <p><strong>Name:</strong> <span th:text="${event.name}"></span></p>
    <p><strong>Category:</strong> <span th:text="${event.category}"></span></p>
    <p><strong>Base price per seat:</strong> ₹<span th:text="${event.basePrice}"></span></p>
    <a th:href="@{/admin/events}" class="btn btn-primary">Back to Events</a>
  </div>
</div>
</body>
</html>
