<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Booking Details - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Booking Details</h1>
  <div th:if="${booking}" class="card">
    <p><strong>Booking ID:</strong> <span th:text="${booking.id}"></span></p>
    <p><strong>Seats:</strong> <span th:text="${booking.numberOfSeats}"></span></p>
    <p><strong>Total amount:</strong> ₹<span th:text="${booking.totalAmount}"></span></p>
    <p th:if="${booking.gstAmount != null}"><strong>GST:</strong> ₹<span th:text="${booking.gstAmount}"></span></p>
    <p th:if="${booking.discountAmount != null}"><strong>Discount:</strong> ₹<span th:text="${booking.discountAmount}"></span></p>
    <p><strong>Status:</strong> <span th:text="${booking.status}"></span></p>
    <p><strong>Booking time:</strong> <span th:text="${booking.bookingTime}"></span></p>
    <a th:href="@{/bookings/cancel/{id}(id=${booking.id})}" class="btn btn-primary" th:if="${booking.status == 'CONFIRMED' || booking.status == 'PARTIAL_CANCELLED'}">Cancel Booking</a>
    <a th:href="@{/bookings/my}" class="btn btn-outline">My Bookings</a>
  </div>
</div>
</body>
</html>
