<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Reports - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Reports</h1>
  <div th:if="${reportError}" class="alert alert-danger" th:text="${reportError}"></div>
  <div class="card mb-3">
    <h3 class="card-title">Filters</h3>
    <form th:action="@{/admin/reports}" method="get" class="row g-2">
      <div class="col-auto">
        <label for="eventId">Event</label>
        <select id="eventId" name="eventId" class="form-control">
          <option value="">All events</option>
          <option th:each="e : ${events}" th:value="${e.id}" th:text="${e.name}" th:selected="${eventId != null and eventId == e.id}"></option>
        </select>
      </div>
      <div class="col-auto">
        <label for="fromDate">From Date</label>
        <input type="date" id="fromDate" name="fromDate" class="form-control" th:value="${fromDate}"/>
      </div>
      <div class="col-auto">
        <label for="toDate">To Date</label>
        <input type="date" id="toDate" name="toDate" class="form-control" th:value="${toDate}"/>
      </div>
      <div class="col-auto align-bottom">
        <button type="submit" class="btn btn-primary">Apply</button>
      </div>
    </form>
  </div>
  <div class="table-responsive" th:if="${!#lists.isEmpty(reportRows)}">
    <table class="table">
      <thead>
        <tr>
          <th th:each="cell : ${reportRows[0]}" th:text="${cell}"></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="row, rowStat : ${reportRows}" th:if="${rowStat.index > 0}">
          <td th:each="cell : ${row}" th:text="${cell}"></td>
        </tr>
      </tbody>
    </table>
  </div>
  <div th:if="${#lists.isEmpty(reportRows)}" class="card">
    <p>No report data. Use filters and click Apply, or the report may be empty. Report is loaded from <code>GET /api/v1/bookings/reports/summary.csv</code> (Booking service).</p>
  </div>
  <a th:href="@{/admin/dashboard}" class="btn btn-primary mt-2">Dashboard</a>
</div>
</body>
</html>
