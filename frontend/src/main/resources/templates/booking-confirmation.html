<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Booking Confirmation - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Booking Confirmation</h1>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
  <div th:if="${booking}" class="card">
    <h2 class="card-title">Thank you! Your booking is confirmed.</h2>
    <p><strong>Booking ID:</strong> <span th:text="${booking.id}"></span></p>
    <p><strong>Seats booked:</strong> <span th:text="${booking.numberOfSeats}"></span></p>
    <p><strong>Total paid:</strong> ₹<span th:text="${booking.totalAmount}"></span></p>
    <p th:if="${booking.gstAmount != null}"><strong>GST amount:</strong> ₹<span th:text="${booking.gstAmount}"></span></p>
    <p th:if="${booking.discountAmount != null && booking.discountAmount > 0}"><strong>Discount applied:</strong> ₹<span th:text="${booking.discountAmount}"></span></p>
    <a th:href="@{/bookings/my}" class="btn btn-primary">My Bookings</a>
    <a th:href="@{/browse}" class="btn btn-outline">Browse more</a>
  </div>
</div>
</body>
</html>
