<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Cancellation - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Cancel Booking</h1>
  <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
  <p th:if="${error != null and booking == null}"><a th:href="@{/bookings/my}" class="btn btn-outline-secondary">Back to My Bookings</a></p>
  <div th:if="${booking != null}" class="card mb-4">
    <div class="card-body">
      <p><strong>Booking ID:</strong> <span th:text="${booking.id}"></span></p>
      <p><strong>Booked seats:</strong> <span th:text="${booking.numberOfSeats}"></span></p>
      <p><strong>Total amount paid:</strong> ₹<span th:text="${booking.totalAmount}"></span></p>
    </div>
  </div>
  <div th:if="${booking != null}" class="card">
    <div class="card-body">
      <form th:action="@{/bookings/cancel/{id}(id=${booking.id})}" method="post">
        <div class="mb-3">
          <label for="seatsToCancel" class="form-label">How many seats do you want to cancel?</label>
          <input type="number" id="seatsToCancel" name="seatsToCancel" class="form-control" style="max-width: 120px;" min="1" th:max="${booking.numberOfSeats}" th:value="${booking.numberOfSeats}" th:placeholder="${'1 to ' + booking.numberOfSeats}" required>
        </div>
        <button type="submit" class="btn btn-warning">Confirm cancellation &amp; get refund</button>
        <a th:href="@{/bookings/my}" class="btn btn-outline-secondary">Back to My Bookings</a>
      </form>
    </div>
  </div>
</div>
</body>
</html>
