<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Add Theater - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Add Theater</h1>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <p class="mb-2"><a th:href="@{/admin/theaters}" class="btn btn-outline">View all Theaters</a></p>
  <div class="card" style="max-width: 500px;">
    <form th:action="@{/admin/theaters/create}" method="post">
      <div class="form-group mb-2">
        <label for="name">Theater Name</label>
        <input type="text" id="name" name="name" class="form-control" th:value="${name}" required/>
      </div>
      <div class="form-group mb-2">
        <label for="address">Address (optional)</label>
        <input type="text" id="address" name="address" class="form-control" th:value="${address}"/>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
      <a th:href="@{/admin/theaters}" class="btn btn-outline">Back to Theaters</a>
    </form>
  </div>
</div>
</body>
</html>
