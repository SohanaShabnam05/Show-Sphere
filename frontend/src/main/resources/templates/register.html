<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Register</h1>
  <p class="text-muted small">Open <strong>http://localhost:9090</strong> in your browser (do not use 8888 or 8080 — that is the gateway).</p>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
  <div class="card" style="max-width: 500px;">
    <form th:action="@{/register}" method="post">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" class="form-control" th:value="${name ?: registerRequest?.name}" required/>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" class="form-control" th:value="${email ?: registerRequest?.email}" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" required minlength="6"/>
      </div>
      <div class="form-group">
        <label for="mobile">Mobile (10 digits)</label>
        <input type="text" id="mobile" name="mobile" class="form-control" th:value="${mobile ?: registerRequest?.mobile}" pattern="[0-9]{10}" maxlength="10" required/>
      </div>
      <div class="form-group">
        <label for="address">Address (optional)</label>
        <input type="text" id="address" name="address" class="form-control" th:value="${address ?: registerRequest?.address}"/>
      </div>
      <div class="form-group">
        <label for="dateOfBirth">Date of Birth</label>
        <input type="date" id="dateOfBirth" name="dateOfBirth" class="form-control" th:value="${dateOfBirth ?: registerRequest?.dateOfBirth}" required/>
      </div>
      <button type="submit" class="btn btn-primary">Register</button>
      <a th:href="@{/login}" class="btn btn-outline">Login</a>
    </form>
  </div>
</div>
</body>
</html>
