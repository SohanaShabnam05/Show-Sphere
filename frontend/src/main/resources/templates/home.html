<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>BookMyShow - Home</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Welcome to BookMyShow</h1>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
  <p class="text-muted small">App URL: <strong>http://localhost:9090</strong></p>
  <div class="card">
    <p>Book events, movies, concerts and live shows. Browse events and manage your bookings.</p>
    <div sec:authorize="!isAuthenticated()">
      <a th:href="@{/login}" class="btn btn-primary">Login</a>
      <a th:href="@{/register}" class="btn btn-outline">Register</a>
    </div>
    <div sec:authorize="hasRole('USER')">
      <a th:href="@{/browse}" class="btn btn-primary">Browse Events</a>
      <a th:href="@{/bookings/my}" class="btn btn-outline">My Bookings</a>
    </div>
    <div sec:authorize="hasRole('ADMIN')">
      <a th:href="@{/admin/dashboard}" class="btn btn-primary">Admin Dashboard</a>
    </div>
  </div>
</div>
</body>
</html>
