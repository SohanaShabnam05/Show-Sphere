<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Booking - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Book Tickets</h1>
  <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
  <div th:if="${show}" class="card">
    <h2 class="card-title" th:text="${show.eventName}"></h2>
    <p><strong>Theater:</strong> <span th:text="${show.theaterName}"></span></p>
    <p><strong>Date &amp; Time:</strong> <span th:text="${show.startTime}"></span></p>
    <p><strong>Available seats:</strong> <span th:text="${show.availableSeats}"></span></p>
    <p><strong>Base price per seat:</strong> ₹<span th:text="${show.basePrice}"></span></p>
    <p class="text-muted small">GST, surge pricing (weekends) and coupon discount are applied by the backend at confirmation.</p>
    <form th:action="@{/bookings/confirm}" method="post">
      <input type="hidden" name="showId" th:value="${showId}"/>
      <div class="form-group">
        <label for="numberOfSeats">Number of tickets</label>
        <input type="number" id="numberOfSeats" name="numberOfSeats" min="1" th:attr="max=${show.availableSeats}" value="1" class="form-control" required/>
      </div>
      <div class="form-group">
        <label for="couponCode">Coupon code (optional)</label>
        <input type="text" id="couponCode" name="couponCode" class="form-control" placeholder="e.g. SAVE10"/>
      </div>
      <button type="submit" class="btn btn-primary">Confirm Booking</button>
      <a th:href="@{/events/{showId}/details(showId=${showId})}" class="btn btn-outline">Back</a>
    </form>
  </div>
</div>
</body>
</html>
