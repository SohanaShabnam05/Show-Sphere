<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Theaters - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Theaters</h1>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <p class="mb-2"><a th:href="@{/admin/theaters/create}" class="btn btn-primary">Add Theater</a></p>
  <div class="table-responsive">
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Address</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="t : ${theaters}">
          <td th:text="${t.id}"></td>
          <td th:text="${t.name}"></td>
          <td th:text="${t.address}"></td>
          <td>
            <a th:href="@{/admin/theaters/view/{id}(id=${t.id})}" class="btn btn-outline btn-sm">View</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div th:if="${#lists.isEmpty(theaters)}" class="card">
    <p>No theaters found. <a th:href="@{/admin/theaters/create}">Add Theater</a></p>
  </div>
  <a th:href="@{/admin/dashboard}" class="btn btn-primary mt-2">Dashboard</a>
</div>
</body>
</html>
