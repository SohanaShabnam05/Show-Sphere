<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Show Details - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Show Details</h1>
  <div th:if="${show}" class="card">
    <p><strong>ID:</strong> <span th:text="${show.id}"></span></p>
    <p><strong>Event:</strong> <span th:text="${show.eventName}"></span></p>
    <p><strong>Category:</strong> <span th:text="${show.eventCategory}"></span></p>
    <p><strong>Theater:</strong> <span th:text="${show.theaterName}"></span> — <span th:text="${show.theaterAddress}"></span></p>
    <p><strong>Start:</strong> <span th:text="${show.startTime}"></span></p>
    <p><strong>End:</strong> <span th:text="${show.endTime}"></span></p>
    <p><strong>Base price:</strong> ₹<span th:text="${show.basePrice}"></span></p>
    <p><strong>Total seats:</strong> <span th:text="${show.totalSeats}"></span></p>
    <p><strong>Available seats:</strong> <span th:text="${show.availableSeats}"></span></p>
    <a th:href="@{/admin/shows}" class="btn btn-primary">Back to Shows</a>
  </div>
</div>
</body>
</html>
