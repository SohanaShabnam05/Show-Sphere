<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Shows - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Shows</h1>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
  <p class="mb-2"><a th:href="@{/admin/shows/create}" class="btn btn-primary">Add Show</a></p>
  <form th:action="@{/admin/shows}" method="get" class="mb-3 row g-2 align-items-end">
    <div class="col-auto">
      <label for="searchEventName" class="form-label mb-0">Search by event name</label>
      <input type="text" id="searchEventName" name="eventName" th:value="${eventName}" class="form-control" placeholder="Event name"/>
    </div>
    <div class="col-auto">
      <label for="searchCategory" class="form-label mb-0">Category</label>
      <select id="searchCategory" name="category" class="form-select">
        <option value="">All</option>
        <option value="MOVIE" th:selected="${category == 'MOVIE'}">MOVIE</option>
        <option value="CONCERT" th:selected="${category == 'CONCERT'}">CONCERT</option>
        <option value="LIVE_SHOW" th:selected="${category == 'LIVE_SHOW'}">LIVE_SHOW</option>
      </select>
    </div>
    <div class="col-auto">
      <button type="submit" class="btn btn-outline-primary">Search</button>
      <a th:href="@{/admin/shows}" class="btn btn-outline-secondary">Clear</a>
    </div>
  </form>
  <div class="table-responsive">
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Event</th>
          <th>Category</th>
          <th>Theater</th>
          <th>Start</th>
          <th>Available</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="s : ${shows}">
          <td th:text="${s.id}"></td>
          <td th:text="${s.eventName}"></td>
          <td th:text="${s.eventCategory}"></td>
          <td th:text="${s.theaterName}"></td>
          <td th:text="${s.startTime}"></td>
          <td th:text="${s.availableSeats}"></td>
          <td>
            <a th:href="@{/admin/shows/view/{id}(id=${s.id})}" class="btn btn-outline btn-sm">View</a>
            <a th:href="@{/admin/shows/edit/{id}(id=${s.id})}" class="btn btn-outline btn-sm btn-primary">Edit</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div th:if="${#lists.isEmpty(shows)}" class="card">
    <p>No shows found. <a th:href="@{/admin/shows/create}">Add Show</a></p>
  </div>
  <a th:href="@{/admin/dashboard}" class="btn btn-primary mt-2">Dashboard</a>
</div>
</body>
</html>
