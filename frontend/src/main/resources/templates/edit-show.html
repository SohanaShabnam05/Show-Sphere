<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Edit Show - BookMyShow</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
  <h1 class="page-title">Edit Show — Seat reserve / release</h1>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div th:if="${show}" class="card mb-4">
    <div class="card-body">
      <p><strong>ID:</strong> <span th:text="${show.id}"></span></p>
      <p><strong>Event:</strong> <span th:text="${show.eventName}"></span></p>
      <p><strong>Category:</strong> <span th:text="${show.eventCategory}"></span></p>
      <p><strong>Theater:</strong> <span th:text="${show.theaterName}"></span></p>
      <p><strong>Start:</strong> <span th:text="${show.startTime}"></span> — <strong>End:</strong> <span th:text="${show.endTime}"></span></p>
      <p><strong>Total seats:</strong> <span th:text="${show.totalSeats}"></span> — <strong>Available:</strong> <span th:text="${show.availableSeats}"></span></p>
    </div>
  </div>
  <div th:if="${show}" class="card">
    <div class="card-header">Seat actions</div>
    <div class="card-body">
      <form th:action="@{/admin/shows/edit/{id}/reserve(id=${show.id})}" method="post" class="d-inline-flex align-items-end gap-2 mb-3">
        <label class="form-label mb-0">Reserve seats (count):</label>
        <input type="number" name="count" min="1" th:max="${show.totalSeats}" value="1" class="form-control" style="width:80px"/>
        <button type="submit" class="btn btn-primary">Reserve</button>
      </form>
      <form th:action="@{/admin/shows/edit/{id}/release(id=${show.id})}" method="post" class="d-inline-flex align-items-end gap-2 mb-3 ms-3">
        <label class="form-label mb-0">Release seats (count):</label>
        <input type="number" name="count" min="1" value="1" class="form-control" style="width:80px"/>
        <button type="submit" class="btn btn-outline-primary">Release</button>
      </form>
      <form th:action="@{/admin/shows/edit/{id}/repair(id=${show.id})}" method="post" class="d-inline ms-3">
        <button type="submit" class="btn btn-outline-secondary">Repair availability</button>
      </form>
      <p class="text-muted small mt-2 mb-0">Reserve: decrease available seats. Release: increase (e.g. after cancellation). Repair: clamp available to [0, total].</p>
    </div>
  </div>
  <p class="mt-3">
    <a th:href="@{/admin/shows/view/{id}(id=${show.id})}" class="btn btn-outline btn-sm">View</a>
    <a th:href="@{/admin/shows}" class="btn btn-primary">Back to Shows</a>
  </p>
</div>
</body>
</html>
