spring:
  profiles:
    active: local
  application:
    name: user-service
server:
  port: ${SERVER_PORT:8082}
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
