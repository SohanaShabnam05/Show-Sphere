spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bookmyshow_booking
    username: root
    password: rootpassword
  # Limit shutdown wait so app exits quickly when Eureka is unreachable
  lifecycle:
    timeout-per-shutdown-phase: 3s

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
