spring:
  datasource:
    url: jdbc:h2:mem:booking_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        globally_quoted_identifiers: true
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
